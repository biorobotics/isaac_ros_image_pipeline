median_blur_node:
  batch_size_:
    type: int
    default_value: 1
    description: "The default batch size of images"
  kernel_width_:
    type: int
    default_value: 3
    description: "Kernel height for blur operation. Needs to be odd"
  kernel_height_:
    type: int
    default_value: 3
    description: "Kernel height for blur operation. Needs to be odd"
  max_var_shape_batch_size_:
    type: int
    default_value: 1
    description: "maximum batch size for var shape operator"
  image_sub_topic_:
    type: string
    default_value: "/image_raw"
    description: "The topic on which the image is subscribed."
  image_pub_topic_:
    type: string
    default_value: "/median_blurred_image"
    description: "The topic on which the image is subscribed."
  bframe_rate_display_:
    type: bool
    default_value: false
    description: "If true, logger will log the frame rate of the callback"
  resize_factor:
        type: double
        default_value: 0.5
        description: "Resize the image before im show (opencv)"
  watermark_scale:
        type: double
        default_value: 0.7
        description: "watermark text scale"
  watermark_thickness:
        type: int
        default_value: 1
        description: "watermark text thickness"
  watermark_x:
        type: int
        default_value: 10
        description: "watermark text x"
  watermark_y:
        type: int
        default_value: 25
        description: "watermark text y"