resize_node:
  batch_size_:
    type: int
    default_value: 1
    description: "The default batch size of images"
  image_sub_topic_:
    type: string
    default_value: "/image_raw"
    description: "The topic on which the image is subscribed."
  image_pub_topic_:
    type: string
    default_value: "/resized_image"
    description: "The topic on which the image is subscribed."
  bframe_rate_display_:
    type: bool
    default_value: false
    description: "If true, logger will log the frame rate of the callback"
  output_image_width_:
    type: int
    default_value: 1280
    description: "The width of the output image"
  output_image_height_:
    type: int
    default_value: 720
    description: "The height of the output image"